<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Babrer – Online Code Editor</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 16px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    header .title span.logo {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #f97316, #b45309);
      display: inline-block;
    }

    header .actions button {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .panes {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .editor-column {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1f2937;
      background: #020617;
    }

    .editor-tabs {
      display: flex;
      border-bottom: 1px solid #1f2937;
      background: #020617;
    }

    .editor-tab {
      flex: 1;
      padding: 8px 10px;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      border-right: 1px solid #1f2937;
      color: #9ca3af;
    }

    .editor-tab.active {
      background: #111827;
      color: #e5e7eb;
      font-weight: 500;
    }

    .editor-area {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    textarea {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 10px;
      font-family: ui-monospace, monospace;
      font-size: 13px;
      background: #020617;
      color: #e5e7eb;
      line-height: 1.4;
      tab-size: 2;
      overflow: auto;
    }

    .preview-column {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #020617;
    }

    .preview-header {
      padding: 8px 10px;
      border-bottom: 1px solid #1f2937;
      font-size: 13px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    iframe {
      flex: 1;
      border: none;
      background: white;
    }

    .console-panel {
      height: 150px;
      background: #0f172a;
      border-top: 1px solid #1f2937;
      display: flex;
      flex-direction: column;
    }

    .console-header {
      padding: 6px 10px;
      font-size: 12px;
      color: #9ca3af;
      border-bottom: 1px solid #1f2937;
    }

    #console-output {
      flex: 1;
      padding: 8px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      color: #e5e7eb;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<header>
  <div class="title">
    <span class="logo"></span>
    <span>Babrer</span>
    <span style="font-size: 12px; color:#6b7280;">online code editor</span>
  </div>
  <div class="actions">
    <button id="clear-project">Clear</button>
  </div>
</header>

<main>
  <div class="panes">

    <section class="editor-column">
      <div class="editor-tabs">
        <div class="editor-tab active" data-target="html">HTML</div>
        <div class="editor-tab" data-target="css">CSS</div>
        <div class="editor-tab" data-target="js">JS</div>
      </div>

      <div class="editor-area">
        <textarea id="editor-html"></textarea>
        <textarea id="editor-css" style="display:none;"></textarea>
        <textarea id="editor-js" style="display:none;"></textarea>
      </div>
    </section>

    <section class="preview-column">
      <div class="preview-header">
        <span>WebView</span>
        <button id="run">Run ▶</button>
      </div>

      <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>

      <div class="console-panel">
        <div class="console-header">Console</div>
        <div id="console-output"></div>
      </div>
    </section>

  </div>
</main>

<script>
  var htmlEditor = document.getElementById('editor-html');
  var cssEditor = document.getElementById('editor-css');
  var jsEditor = document.getElementById('editor-js');
  var previewFrame = document.getElementById('preview');
  var runButton = document.getElementById('run');
  var clearButton = document.getElementById('clear-project');
  var tabs = Array.from(document.querySelectorAll('.editor-tab'));

  var STORAGE_KEY = 'babrer-project';

  function printToConsole(type, message) {
    var output = document.getElementById('console-output');
    var line = document.createElement('div');
    line.textContent = message;
    line.style.color = type === 'error' ? '#f87171' : '#e5e7eb';
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  }

  window.addEventListener('message', function(event) {
    if (!event.data || !event.data.babrerConsole) return;
    printToConsole(event.data.type, event.data.message);
  });

  function loadProject() {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) {
      htmlEditor.value =
`<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Babrer</title>
</head>
<body>
  <h1>Hello from Babrer</h1>
  <p>Edit HTML, CSS, and JS, then click Run.</p>
</body>
</html>`;
      cssEditor.value =
`body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  text-align: center;
  padding-top: 40px;
}

h1 {
  color: #f97316;
}`;
      jsEditor.value = `console.log('Babrer WebView running');`;
      return;
    }
    try {
      var project = JSON.parse(saved);
      htmlEditor.value = project.html || '';
      cssEditor.value = project.css || '';
      jsEditor.value = project.js || '';
    } catch (e) {}
  }

  function saveProject() {
    var project = {
      html: htmlEditor.value,
      css: cssEditor.value,
      js: jsEditor.value
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(project));
  }

  function runProject() {
    saveProject();

    var html = htmlEditor.value;
    var css = "<style>" + cssEditor.value + "</style>";
    var js = "<script>" + jsEditor.value.replace(/<\/script>/g, "<\\/script>") + "<\/script>";

    var injectedConsole =
      `<script>
        (function() {
          var send = function(type, args) {
            parent.postMessage({ babrerConsole: true, type: type, message: args.join(' ') }, '*');
          };
          console.log = function() { send('log', Array.from(arguments)); };
          console.error = function() { send('error', Array.from(arguments)); };
          console.warn = function() { send('warn', Array.from(arguments)); };
          console.info = function() { send('info', Array.from(arguments)); };
        })();
      <\/script>`;

    var fullDoc =
      "<!DOCTYPE html><html>" +
      html
        .replace("</head>", css + "</head>")
        .replace("</body>", injectedConsole + js + "</body>") +
      "</html>";

    var doc = previewFrame.contentWindow.document;
    doc.open();
    doc.write(fullDoc);
    doc.close();
  }

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');

      var target = tab.dataset.target;
      htmlEditor.style.display = target === 'html' ? 'block' : 'none';
      cssEditor.style.display = target === 'css' ? 'block' : 'none';
      jsEditor.style.display = target === 'js' ? 'block' : 'none';
    });
  });

  runButton.addEventListener('click', runProject);

  clearButton.addEventListener('click', function() {
    if (confirm('Clear current project?')) {
      localStorage.removeItem(STORAGE_KEY);
      loadProject();
      runProject();
    }
  });

  ['input', 'keyup', 'change'].forEach(function(evt) {
    htmlEditor.addEventListener(evt, saveProject);
    cssEditor.addEventListener(evt, saveProject);
    jsEditor.addEventListener(evt, saveProject);
  });

  loadProject();
  runProject();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>

</body>
</html>
